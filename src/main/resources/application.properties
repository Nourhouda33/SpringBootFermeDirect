# ============================================================
# FermeDirecte - Spring Boot Application Properties
# ============================================================

spring.application.name=FermeDirecte

# -------------------------------------------------------
# Database (XAMPP MySQL)
# -------------------------------------------------------
spring.datasource.url=jdbc:mysql://localhost:3306/fermedirecte?useSSL=false&serverTimezone=UTC&characterEncoding=UTF-8&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# -------------------------------------------------------
# JWT Configuration
# -------------------------------------------------------
# Clé secrète pour signer les tokens JWT (minimum 256 bits / 32 caractères)
jwt.secret=FermeDirecte2024SecretKeyForJWTTokenSignatureWithHMACSHA256AlgorithmSecureEnough!@#$%
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# HikariCP connection pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-timeout=30000

# -------------------------------------------------------
# JPA / Hibernate
# -------------------------------------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=fals\
  e
spring.jpa.open-in-view=false
# Batch fetching : charge les relations lazy en lots de 16 au lieu de 1 par 1
spring.jpa.properties.hibernate.default_batch_fetch_size=16

spring.sql.init.mode=never

# -------------------------------------------------------
# Server
# -------------------------------------------------------
server.port=8081
server.error.include-message=always
server.error.include-binding-errors=always
server.tomcat.max-http-form-post-size=20MB    
server.tomcat.max-swallow-size=20MB
spring.mvc.servlet.load-on-startup=1

# -------------------------------------------------------
# Multipart (file upload)
# -------------------------------------------------------
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=15MB

# -------------------------------------------------------
# CORS (Angular dev server)
# -------------------------------------------------------
app.cors.allowed-origins=http://localhost:4200,http://localhost:4201,https://area-varsity-curvature.ngrok-free.dev,https://fermedirect-ab9b5.firebaseapp.com,https://fermedirect-ab9b5.web.app

# -------------------------------------------------------
# Swagger / OpenAPI (Springdoc)
# -------------------------------------------------------
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.filter=true

# -------------------------------------------------------
# Logging
# -------------------------------------------------------
logging.level.root=WARN
logging.level.com.FermeDirecte=DEBUG
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=DEBUG
