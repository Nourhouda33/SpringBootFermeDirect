# ============================================================
# FermeDirecte - Configuration Railway (Production)
# Les valeurs sensibles sont lues depuis les variables d'env Railway
# ============================================================

spring.application.name=FermeDirecte

# -------------------------------------------------------
# Database — Railway MySQL (variables injectées automatiquement)
# -------------------------------------------------------
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# -------------------------------------------------------
# JWT
# -------------------------------------------------------
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# -------------------------------------------------------
# JPA / Hibernate
# -------------------------------------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.open-in-view=false
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=never

# -------------------------------------------------------
# Server — Railway injecte PORT automatiquement
# -------------------------------------------------------
server.port=${PORT:8081}
server.error.include-message=always

# -------------------------------------------------------
# Multipart
# -------------------------------------------------------
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=15MB

# -------------------------------------------------------
# CORS
# -------------------------------------------------------
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://fermedirect-ab9b5.web.app,https://fermedirect-ab9b5.firebaseapp.com}

# -------------------------------------------------------
# Swagger désactivé en prod
# -------------------------------------------------------
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# -------------------------------------------------------
# Logging
# -------------------------------------------------------
logging.level.root=WARN
logging.level.com.FermeDirecte=INFO
logging.level.org.springframework.security=WARN
